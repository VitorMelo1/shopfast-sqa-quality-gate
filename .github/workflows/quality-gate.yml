# Quality Gate QG-01 (exemplo): falha no CI = merge/deploy bloqueado via branch protection.
name: quality-gate

on:
  push:
    branches: [main, master, release/**]
  pull_request:
    branches: [main, master, release/**]

jobs:
  typecheck-and-policy-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
